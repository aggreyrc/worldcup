services:
  # ── Flask API (serves data directly, Flask-Caching handles Redis TTL) ──
  - type: web
    name: livescore-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -w 2 -b 0.0.0.0:$PORT 'app:create_app()'"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: FOOTBALL_PROVIDER
        value: espn
      - key: DATABASE_URL
        fromDatabase:
          name: livescore-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: livescore-redis
          type: redis
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.9"

  # ── React Frontend (static site) ───────────────────────
  - type: web
    name: livescore-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://livescore-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Redis ───────────────────────────────────────────────
  - type: redis
    name: livescore-redis
    plan: free
    ipAllowList: []

databases:
  # ── PostgreSQL ──────────────────────────────────────────
  - name: livescore-db
    plan: free
    databaseName: livescore
    user: livescore